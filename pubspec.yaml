name: agric_assist_zw
description: Agriculture Assistant System for Zimbabwe
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0

  # Secure Storage (for JWT token)
  flutter_secure_storage: ^9.0.0

  # HTTP client
  http: ^1.1.0

  # Shared Preferences
  shared_preferences: ^2.2.2

  # Form validation
  email_validator: ^2.1.17

  # Loading indicators
  flutter_spinkit: ^5.2.0

  # Icons
  cupertino_icons: ^1.0.6

  # Date/time formatting
  intl: ^0.18.1

  # Connectivity check
  connectivity_plus: ^5.0.2

  # JSON serialization
  json_annotation: ^4.8.1

  # Payment — Paynow SHA512 hash
  crypto: ^3.0.3

  # File share
  share_plus: ^7.2.0

  # Open URLs in browser
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

  # App icon generator
  flutter_launcher_icons: ^0.14.1

# ─── App Icon Configuration ───────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700